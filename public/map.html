<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Bus Tracking - SmartTrack</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;600;700&display=swap');
      body { font-family: 'Inter', sans-serif; }
    </style>
  </head>
  <body class="bg-slate-50 min-h-screen flex flex-col">
    <nav class="bg-white border-b border-slate-200 px-6 py-4">
      <div class="max-w-7xl mx-auto flex items-center justify-between">
        <a href="/" class="text-xl font-bold text-slate-900 flex items-center gap-2">
          <span class="bg-blue-600 text-white p-1.5 rounded-lg">
            <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3"/><path d="M22 22h-4"/><path d="M3 18h3"/><path d="M2 22h4"/><path d="M4 6h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z"/></svg>
          </span>
          SmartTrack
        </a>
        <div id="bus-display" class="text-sm font-medium text-slate-500 bg-slate-100 px-3 py-1 rounded-full">
          Tracking: Loading...
        </div>
      </div>
    </nav>

    <main class="flex-grow flex flex-col items-center justify-center p-6">
      <div class="w-full max-w-4xl bg-white rounded-3xl shadow-xl border border-slate-200 overflow-hidden">
        <div class="p-8 border-b border-slate-100 flex justify-between items-center">
          <div>
            <h1 class="text-2xl font-bold text-slate-900">Live Map View</h1>
            <p class="text-slate-500">Real-time location data for <span id="bus-id-label" class="font-semibold text-blue-600">...</span></p>
          </div>
          <div class="flex gap-2">
            <button onclick="location.reload()" class="p-2 hover:bg-slate-100 rounded-lg transition-colors text-slate-600">
              <svg xmlns="http://www.w3.org/2000/svg" width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 12a9 9 0 0 1 9-9 9.75 9.75 0 0 1 6.74 2.74L21 8"/><path d="M21 3v5h-5"/><path d="M21 12a9 9 0 0 1-9 9 9.75 9.75 0 0 1-6.74-2.74L3 16"/><path d="M3 21v-5h5"/></svg>
            </button>
          </div>
        </div>
        
        <div class="aspect-video bg-slate-100 relative overflow-hidden flex items-center justify-center">
          <!-- Mock Map -->
          <div class="absolute inset-0 opacity-20" style="background-image: radial-gradient(#cbd5e1 2px, transparent 2px); background-size: 40px 40px;"></div>
          
          <div id="bus-marker" class="relative z-10 transition-all duration-1000 ease-in-out">
            <div class="bg-blue-600 text-white p-3 rounded-full shadow-lg shadow-blue-500/50 animate-bounce">
              <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M8 6v6"/><path d="M15 6v6"/><path d="M2 12h19.6"/><path d="M18 18h3"/><path d="M22 22h-4"/><path d="M3 18h3"/><path d="M2 22h4"/><path d="M4 6h16a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V8a2 2 0 0 1 2-2Z"/></svg>
            </div>
            <div class="absolute top-full left-1/2 -translate-x-1/2 mt-2 whitespace-nowrap bg-slate-900 text-white text-[10px] px-2 py-1 rounded font-bold uppercase tracking-tighter">
              Live Location
            </div>
          </div>

          <div class="absolute bottom-6 right-6 bg-white/90 backdrop-blur p-4 rounded-2xl shadow-lg border border-white/20 text-xs space-y-2">
            <div class="flex justify-between gap-8">
              <span class="text-slate-500">Speed</span>
              <span class="font-bold text-slate-900">42 km/h</span>
            </div>
            <div class="flex justify-between gap-8">
              <span class="text-slate-500">Next Stop</span>
              <span class="font-bold text-slate-900">Central Station</span>
            </div>
            <div class="flex justify-between gap-8">
              <span class="text-slate-500">ETA</span>
              <span class="font-bold text-blue-600">4 mins</span>
            </div>
          </div>
        </div>
      </div>

      <a href="/" class="mt-8 text-blue-600 font-semibold flex items-center gap-2 hover:underline">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="m15 18-6-6 6-6"/></svg>
        Back to Search
      </a>
    </main>

    <script>
      const urlParams = new URLSearchParams(window.location.search);
      const busId = urlParams.get('busId') || 'Unknown';
      document.getElementById('bus-id-label').textContent = busId;
      document.getElementById('bus-display').textContent = `Tracking: ${busId}`;

      // Simple mock movement
      const marker = document.getElementById('bus-marker');
      let x = 0;
      let y = 0;
      
      function moveBus() {
        x = (Math.random() - 0.5) * 100;
        y = (Math.random() - 0.5) * 100;
        marker.style.transform = `translate(${x}px, ${y}px)`;
      }

      setInterval(moveBus, 3000);
      moveBus();
    </script>
  </body>
</html>
